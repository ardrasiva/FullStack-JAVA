<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter signup</title>
</head>
<body>
    <section>
    <h1 align="center">Newsletter Signup</h1>
    <form>
        <label for="name" align="center">Full Name:</label>
        <input type="text" id="name" name="name" required ><br><br>
        <label for="email" align="center">Email:</label>
        <input type="email" id="email" name="email" required><br><br>
        <label for="termsandcond" align="center">I agree to the terms and conditions : </label>
        <input type="checkbox" id="termsandcond" required>
        <br><br>
        <input type="submit" name="submit" align="center">
        <br><br>

    </form>

    </section>
</body>
</html>
