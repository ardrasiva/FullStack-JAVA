<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .outer-box {
            width: 300px;
            height: 300px;
            background-color: lightblue;
            border: 50px solid darkblue;
            margin: 300px;
            padding: 100px;
        }

        .middle-box {
            background-position: center;
            background-color: lightgreen;
            border: 25px solid darkgreen;
            margin: -11px;
            padding: 100px;
        }

        .inner-box {
            width: 50px;
            height: 50px;
            background-position: center;
            background-color: lightcoral;
            border: 12px solid darkred;
            margin-right: 5px;
            padding: 10px;
           
        }

    </style>

    <title>Box model</title>
</head>
<body>
    <div class="outer-box">
        <div class="middle-box">
            <div class="inner-box">
                content
            </div>
        </div>
    </div>
</body>
</html>
