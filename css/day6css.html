<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @media only screen and (max-width: 600px) {
        .box{
            width: 250px;
            height: 70%;
            border: 1px solid black;
            margin: auto;
            font-size: small;
            margin-top: 120px;
            border-radius: 20px; 
            text-align: center;           
        }
    }
        @media only screen and (min-width:601px){
            .box{
                background-color: lightblue;
                width:250px;
                height:70%;
                border: 1px solid black;
                margin:auto;
                font-size: large;
                margin-top: 120px;
                border-radius: 20px; 
                text-align: center; 
            }
        }

        img{
            
            width:150px;
            height: 150px;
            margin-left: 30px;
            margin-top: 20px;
            margin-right: 20px;
            border: 1px solid black;
            border-top-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }
        h3{
            text-align: center;
            padding:10px;
        }

        button{

            color: yellow;
            background-color: purple;
            padding: 10px;
            margin-left: 10px;
            margin-bottom: 20px;
        }
    </style>
    <title>Buy Now</title>
</head>
<body>
    <div class="box">
        <img src="https://encrypted-tbn1.gstatic.com/shopping?q=tbn:ANd9GcQahYeIIFjoLRKEgFq3qarZeB4OfN5X-Ywox09ZbLn1uWSPkWWE6_Yp2u71p-97II2ZggQpWRqevUgsUa8vFYsNOmgsz87eBvQnNeWephh1bixG30KYA7em">
        <h3>HP Standard Laptop AMD Ryzen 3 15.6"</h3>
        <button>Buy now</button>
    </div>
</body>
</html>
