<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form for bakery</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
</head>
<body>
    <div class="container mt-5">
        <h4 class="display-4 mt-3 text-center">Bakery Feedback Form</h4>
        <div class="form-group p-3">
            <label for="name">Name: </label>
            <input type="text" id="name" class="form-control" placeholder="Name">
            <label for="email" class="mt-2">Email: </label>
            <input type="email" id="email" class="form-control" placeholder="Email">
            <label for="fmsg" class="mt-2">Feedback Message: </label>
            <textarea class="form-control" rows="3" id="fmsg"></textarea>
            <p class="mt-3">Preferred Contact Method: </p>
            <div class="form-check-inline">
            <label class="form-check-label">Email
                <input type="radio" class="form-check-input "name="optradio">
            </label>
            </div>
            <div class="form-check-inline">
            <label class="form-check-label">Phone
                <input type="radio" class="form-check-input"name="optradio">
            </label>
            </div>
            <div class="dropdown mt-2">
            <p class="mt-3">How Satisfied Are you?(1-10)</p>
            <button class="btn btn-light dropdown-toggle btn-block"
                type="button"
                data-toggle="dropdown">
                Select a number
            </button>

            <div class="dropdown-menu">
                <a class="dropdown-item" href="#">1</a>
                <a class="dropdown-item" href="#">2</a>
                <a class="dropdown-item" href="#">3</a>
                <a class="dropdown-item" href="#">4</a>
                <a class="dropdown-item" href="#">5</a>
                <a class="dropdown-item" href="#">6</a>
                <a class="dropdown-item" href="#">7</a>
                <a class="dropdown-item" href="#">8</a>
                <a class="dropdown-item" href="#">9</a>
                <a class="dropdown-item" href="#">10</a>
            </div>
        </div>
        <div class="dropdown mt-2">
            <p class="mt-3">Type of Order:</p>
            <button class="btn btn-light dropdown-toggle btn-block"
                type="button"
                data-toggle="dropdown">
                Select the type:
            </button>

            <div class="dropdown-menu">
                <a class="dropdown-item" href="#">Cake</a>
                <a class="dropdown-item" href="#">Cookies</a>
                <a class="dropdown-item" href="#">Pastries</a>
            </div>
        </div>

        <button type="submit" class="btn btn-success mt-4 p-2">Submit</button>

    </div>
</body>
</html>
