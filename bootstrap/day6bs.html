<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
</head>
<body>
    <div class="container mt-3">
        <h4 class="display-4 mt-4 text-center">Feedback Form</h4>
        <div class="form-group p-3">
            <label for="name">Name: </label>
            <input type="text" id="name" class="mt-2 mb-3 form-control" placeholder="Name">
            <label for="email">Email: </label>
            <input type="email" id="email" class="mt-2 mb-3 form-control" placeholder="Email">
            <label for="fmsg">Feedback Message: </label>
            <textarea class="form-control" rows="3" id="fmsg"></textarea>

            <label class="mt-2">How did you find our Website?</label>

            <div class="dropdown mt-2">
            <button class="btn btn-light dropdown-toggle btn-block text-left "
                type="button"
                data-toggle="dropdown">
                Select an option
            </button>

            <div class="dropdown-menu">
                <a class="dropdown-item" href="#">Google</a>
                <a class="dropdown-item" href="#">Social Media</a>
                <a class="dropdown-item" href="#">Friend</a>
                <a class="dropdown-item" href="#">Advertisement</a>
                <a class="dropdown-item" href="#">Other</a>
            </div>
        </div>

            <p class="mt-3">How Satisfied are you? </p>
            <div class="form-check-inline">
            <label class="form-check-label">1
                <input type="radio" class="form-check-input "name="optradio">
            </label>
            </div>
            <div class="form-check-inline">
            <label class="form-check-label">2
                <input type="radio" class="form-check-input"name="optradio">
            </label>
            </div>
            <div class="form-check-inline">
            <label class="form-check-label">3
                <input type="radio" class="form-check-input" name="optradio">
            </label>
            </div>
            <div class="form-check-inline">
            <label class="form-check-label">4
                <input type="radio" class="form-check-input" name="optradio">
            </label>
            </div>
            <div class="form-check-inline">
            <label class="form-check-label">5
                <input type="radio" class="form-check-input" name="optradio">
            </label>
            </div>
            <br>
            <button class="btn btn-info justify-content-center mt-3 p-2">Submit</button>
        </div>
    
    </div>
</body>
</html>
