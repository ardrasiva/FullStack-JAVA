<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student dashboard</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
</head>
<body>
    <ul class="breadcrumb">
        <li class = "breadcrumb-item"><a href="#">Home </a></li>
        <li class = "breadcrumb-item"><a href="#">Dashboard </a></li>
        <li class = "breadcrumb-item"><a href="#">My Courses</a></li>
    </ul>
    <div class="container">
        <button type = "button" class = "btn btn-outline-primary btn-md">Start New Course</button>
        <h1 class="text-center mb-4">My Progress <span class = "badge badge-primary">3 Courses</span></h1>
        
        <div class="progress mb-4">
        <div class="progress-bar progress-bar-striped progress-bar-animated" style="width:70%">70%</div>
        </div>
        <ul class="pagination justify-content-center">
            <li class="page-item"><a class="page-link" href="#">1</a></li>
            <li class="page-item active"><a class="page-link" href="#">2</a></li>
            <li class="page-item"><a class="page-link" href="#">3</a></li>
        </ul>
    </div>
</body>
</html>
